services:
  - type: web
    name: meetmind-ai
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      cd ../frontend
      npm install
      npm run build
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: WHISPER_DEVICE
        value: cpu
      - key: WHISPER_COMPUTE_TYPE
        value: int8